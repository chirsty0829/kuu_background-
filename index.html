<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뀨 kuu 🎀 Background Studio V4</title>
    <style>
        :root { --p: #ffeef2; --a: #ffb7c5; --txt: #726063; }
        * { box-sizing: border-box; font-family: "Quicksand", "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--p); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px; }
        
        /* 1. 預覽區置頂 */
        .preview-section { width: 100%; max-width: 320px; position: sticky; top: 0; z-index: 100; background: var(--p); padding-bottom: 15px; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(255,183,197,0.4); width: 100%; height: auto; border: 6px solid white; }
        .brand-name { color: var(--a); font-size: 1.5rem; margin: 10px 0; font-weight: bold; }
        .dl-btn { background: var(--a); color: white; border: none; padding: 12px; border-radius: 25px; width: 100%; margin-top: 10px; cursor: pointer; font-size: 1rem; font-weight: bold; box-shadow: 0 4px 10px rgba(255,183,197,0.3); }

        /* 2. 下方控制面板 */
        .controls-section { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 40px; }
        .panel { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .panel-h { padding: 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .panel-h h3 { margin: 0; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .panel-b { padding: 0 15px 15px; display: none; border-top: 1px solid #fff0f3; }
        .panel.open .panel-b { display: block; }

        /* UI 元件 */
        .row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        input[type="color"] { border: none; width: 35px; height: 35px; background: none; cursor: pointer; }
        input[type="range"] { flex: 1; height: 5px; -webkit-appearance: none; background: #fce4e8; border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--a); border-radius: 50%; border: 2px solid white; cursor: pointer; }
        .label-text { font-size: 0.8rem; color: #999; width: 60px; }
        .mode-btn { font-size: 0.75rem; border: 1px solid var(--a); color: var(--a); background: white; padding: 3px 8px; border-radius: 10px; cursor: pointer; }
        .mode-btn.active { background: var(--a); color: white; }
        input[type="checkbox"] { transform: scale(1.3); accent-color: var(--a); }
    </style>
</head>
<body>

    <div class="preview-section">
        <div class="brand-name">뀨 kuu 🎀</div>
        <canvas id="cv" width="1080" height="1920"></canvas>
        <button class="dl-btn" onclick="save()">儲存背景圖 (.png)</button>
    </div>

    <div class="controls-section">
        <div class="panel open">
            <div class="panel-h"><h3>🎨 基礎色調</h3></div>
            <div class="panel-b">
                <div class="row"><input type="color" id="bg" value="#ffeef2"><span class="label-text">背景底色</span></div>
                <div class="row"><input type="color" id="pc" value="#ffffff"><span class="label-text">圖案顏色</span></div>
            </div>
        </div>

        <div id="shape-panels"></div>
    </div>

<script>
    const c = document.getElementById('cv'), ctx = c.getContext('2d'), g = id => document.getElementById(id);
    const shapeData = [
        { id: 'dots', name: '⚪ 波點', sz: 15, sp: 70, on: true },
        { id: 'stars', name: '⭐ 星星', sz: 20, sp: 100, on: false },
        { id: 'hearts', name: '💖 飽滿愛心', sz: 25, sp: 100, on: false },
        { id: 'clovers', name: '🍀 四葉草', sz: 25, sp: 110, on: false },
        { id: 'bows', name: '🎀 蝴蝶結', sz: 30, sp: 120, on: false },
        { id: 'stripes', name: '➖ 條紋', sz: 10, sp: 50, on: false, ang: 315 }
    ];

    // 初始化面板
    shapeData.forEach(s => {
        const html = `
            <div class="panel" id="p_${s.id}">
                <div class="panel-h">
                    <h3><input type="checkbox" id="${s.id}_on" ${s.on?'checked':''}> ${s.name}</h3>
                    <span onclick="togglePanel('${s.id}')">▼</span>
                </div>
                <div class="panel-b">
                    <div class="row"><span class="label-text">大小</span><input type="range" id="${s.id}_sz" min="2" max="80" value="${s.sz}"></div>
                    <div class="row"><span class="label-text">間距</span><input type="range" id="${s.id}_sp" min="30" max="350" value="${s.sp}"></div>
                    ${s.id !== 'stripes' ? `<button class="mode-btn active" id="${s.id}_fm" onclick="tglFill('${s.id}')">填充模式: ON</button>` : 
                    `<div class="row"><span class="label-text">角度</span><input type="range" id="stripes_an" min="0" max="360" value="${s.ang}"></div>`}
                </div>
            </div>`;
        g('shape-panels').insertAdjacentHTML('beforeend', html);
    });

    function togglePanel(id) { g('p_'+id).classList.toggle('open'); }
    function tglFill(id) { 
        const b = g(id+'_fm'); b.classList.toggle('active'); 
        b.innerText = b.classList.contains('active') ? '填充模式: ON' : '填充模式: OFF';
        draw();
    }

    // 繪製函數
    const drawStar = (x, y, sz, fill) => {
        let r=sz, ir=sz*0.45, rot=Math.PI/2*3, step=Math.PI/5;
        ctx.beginPath(); ctx.moveTo(x, y-r);
        for(let i=0;i<5;i++){
            ctx.lineTo(x+Math.cos(rot)*r, y+Math.sin(rot)*r); rot+=step;
            ctx.lineTo(x+Math.cos(rot)*ir, y+Math.sin(rot)*ir); rot+=step;
        }
        ctx.closePath(); fill?ctx.fill():ctx.stroke();
    }
    const drawHeart = (x, y, sz, fill) => {
        ctx.beginPath(); let t = sz;
        ctx.moveTo(x, y + t * 0.7);
        ctx.bezierCurveTo(x - t * 0.9, y - t * 0.1, x - t * 0.4, y - t * 0.8, x, y - t * 0.2);
        ctx.bezierCurveTo(x + t * 0.4, y - t * 0.8, x + t * 0.9, y - t * 0.1, x, y + t * 0.7);
        fill?ctx.fill():ctx.stroke();
    }
    const drawClover = (x, y, s, fill) => {
        for(let i=0; i<4; i++) {
            ctx.save(); ctx.translate(x, y); ctx.rotate((i*90)*Math.PI/180);
            ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(-s, -s, s, -s, 0, 0);
            fill?ctx.fill():ctx.stroke(); ctx.restore();
        }
    }
    const drawBow = (x, y, s, fill) => {
        ctx.beginPath(); ctx.ellipse(x-s*0.5, y, s*0.6, s*0.4, 0.5, 0, 7);
        ctx.ellipse(x+s*0.5, y, s*0.6, s*0.4, -0.5, 0, 7);
        ctx.arc(x, y, s*0.2, 0, 7); fill?ctx.fill():ctx.stroke();
    }

    function draw() {
        const w=c.width, h=c.height, color=g('pc').value;
        ctx.fillStyle=g('bg').value; ctx.fillRect(0,0,w,h);
        ctx.fillStyle=color; ctx.strokeStyle=color; ctx.lineWidth=3;

        // 1. 條紋
        if(g('stripes_on').checked) {
            const sz=+g('stripes_sz').value, sp=+g('stripes_sp').value, an=+g('stripes_an').value * Math.PI/180;
            ctx.lineWidth=sz;
            for(let i=-2500; i<2500; i+=sp) {
                ctx.beginPath(); ctx.moveTo(i*Math.cos(an)-2000*Math.sin(an), i*Math.sin(an)+2000*Math.cos(an));
                ctx.lineTo(i*Math.cos(an)+2000*Math.sin(an), i*Math.sin(an)-2000*Math.cos(an)); ctx.stroke();
            }
        }

        // 2. 其它圖案
        shapeData.filter(s=>s.id!=='stripes').forEach(s => {
            if(!g(s.id+'_on').checked) return;
            const sz=+g(s.id+'_sz').value, sp=+g(s.id+'_sp').value, isF=g(s.id+'_fm').classList.contains('active');
            for(let y=0; y<h+sp; y+=sp) for(let x=0; x<w+sp; x+=sp) {
                let sh = (Math.floor(y/sp)%2==0)?0:sp/2;
                if(s.id==='dots'){ ctx.beginPath(); ctx.arc(x+sh,y,sz,0,7); isF?ctx.fill():ctx.stroke(); }
                if(s.id==='stars') drawStar(x+sh, y, sz, isF);
                if(s.id==='hearts') drawHeart(x+sh, y, sz, isF);
                if(s.id==='clovers') drawClover(x+sh, y, sz, isF);
                if(s.id==='bows') drawBow(x+sh, y, sz, isF);
            }
        });
    }

    document.querySelectorAll('input').forEach(i => i.oninput = draw);
    function save() { let a=document.createElement('a'); a.download='kuu_bg.png'; a.href=c.toDataURL(); a.click(); }
    draw();
</script>
</body>
</html>
